name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_os: linux
            asset_arch: amd64
            ext: ""
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            asset_os: darwin
            asset_arch: amd64
            ext: ""
          - os: macos-15
            goos: darwin
            goarch: arm64
            asset_os: darwin
            asset_arch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_os: windows
            asset_arch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="deadcode-supervisor_${GITHUB_REF_NAME}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}${{ matrix.ext }}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -o "dist/${asset}" ./cmd/deadcode-supervisor

      - name: Smoke release artifact
        shell: bash
        run: |
          set -euo pipefail
          asset="deadcode-supervisor_${GITHUB_REF_NAME}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}${{ matrix.ext }}"
          "dist/${asset}" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadcode-supervisor-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum * > checksums.txt)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
